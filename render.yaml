services:
  - type: web
    name: hedgehog-library-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: ohio
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hedgehog-library-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2

databases:
  - name: hedgehog-library-db
    databaseName: hedgehog_library
    user: hedgehog
    plan: free
    postgresMajorVersion: 16
    region: ohio
